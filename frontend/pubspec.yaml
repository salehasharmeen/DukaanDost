name: dukandostapp
description: "Dukan Dost - Your Shop Companion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"
  
dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Audio recording
  record: ^6.2.1
  just_audio: ^0.9.38

  # File system (needed by voice_service)
  path_provider: ^2.1.3
  permission_handler: ^11.3.1


  # File picking
  

  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  flutter_lints: ^3.0.0
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  #assets:
   # - assets/images/